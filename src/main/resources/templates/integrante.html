<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Integrante</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">⚽ Escalação</a>

        <div>
            <a href="/cadastro-integrante" class="btn btn-outline-light me-2">
                Jogadores
            </a>
            <a href="/montar-time" class="btn btn-outline-light">
                Times
            </a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <h2>👤 Cadastro de Jogador</h2>

    <form id="formIntegrante">
        <div class="mb-3">
            <input type="text" id="nome" class="form-control" placeholder="Nome" required>
        </div>

        <div class="mb-3">
            <input type="text" id="funcao" class="form-control" placeholder="Função (Ex: Atacante)" required>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>
</div>

<script src="/js/integrante.js"></script>
</body>
</html>
